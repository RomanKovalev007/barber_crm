services:

  # ─── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/postgres/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
      KAFKA_LOG4J_LOGGERS: "org.apache.kafka.image.loader.MetadataLoader=WARN,org.apache.kafka.controller=WARN"
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - "8123:8123"   # HTTP-интерфейс (curl, DBeaver)
      - "9000:9000"   # Нативный протокол (clickhouse-client)
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ─── Migrations (запускаются один раз, затем завершаются) ─────────────────────

  staff-migrate:
    build:
      context: ./services/staff
    entrypoint: ["/migrate"]
    command: ["-direction", "up"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: staff_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  booking-migrate:
    build:
      context: ./services/booking
    entrypoint: ["/migrate"]
    command: ["up"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: booking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  client-migrate:
    build:
      context: ./services/client
    entrypoint: ["/migrate"]
    command: ["up"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: client_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  analytics-migrate:
    build:
      context: ./services/analytics
    entrypoint: ["/migrate"]
    command: ["-direction", "up"]
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_DATABASE: analytics
      CLICKHOUSE_PASSWORD: clickhouse
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"

  # ─── Application services ─────────────────────────────────────────────────────

  staff:
    build:
      context: ./services/staff
    environment:
      GRPC_PORT: ":50051"
      JWT_SECRET: dev-jwt-secret-change-in-prod
      POSTGRES_HOST: postgres
      POSTGRES_DB: staff_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BROKERS: kafka:9092
      METRICS_PORT: ":9091"
    depends_on:
      staff-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "50051:50051"

  booking:
    build:
      context: ./services/booking
    environment:
      GRPC_PORT: ":50051"
      JWT_SECRET: dev-jwt-secret-change-in-prod
      STAFF_GRPC_ADDR: staff:50051
      POSTGRES_HOST: postgres
      POSTGRES_DB: booking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BROKERS: kafka:9092
      METRICS_PORT: ":9092"
    depends_on:
      booking-migrate:
        condition: service_completed_successfully
      staff:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "50052:50051"

  analytics:
    build:
      context: ./services/analytics
    environment:
      GRPC_PORT: ":50051"
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_DATABASE: analytics
      CLICKHOUSE_PASSWORD: clickhouse
      KAFKA_BROKERS: kafka:9092
      METRICS_PORT: ":9093"
    depends_on:
      analytics-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    ports:
      - "50053:50051"

  client:
    build:
      context: ./services/client
    environment:
      GRPC_PORT: ":50051"
      POSTGRES_HOST: postgres
      POSTGRES_DB: client_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      KAFKA_BROKERS: kafka:9092
      METRICS_PORT: ":9094"
    depends_on:
      client-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    ports:
      - "50054:50051"

  api-gateway:
    build:
      context: ./services/api-gateway
    environment:
      HTTP_PORT: ":8080"
      METRICS_PORT: ":9095"
      JWT_SECRET: dev-jwt-secret-change-in-prod
      STAFF_ADDR: staff:50051
      BOOKING_ADDR: booking:50051
      ANALYTICS_ADDR: analytics:50051
      CLIENT_ADDR: client:50051
    depends_on:
      - staff
      - booking
      - analytics
      - client
    ports:
      - "8080:8080"

  # ─── Observability ────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    depends_on:
      - api-gateway
      - staff
      - booking
      - analytics
      - client

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_PROVISIONING_PATH: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  kafka_data:
  clickhouse_data:
  prometheus_data:
  grafana_data:
