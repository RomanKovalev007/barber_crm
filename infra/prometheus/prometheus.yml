global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: staff
    static_configs:
      - targets: ['staff:9091']

  - job_name: booking
    static_configs:
      - targets: ['booking:9092']

  - job_name: analytics
    static_configs:
      - targets: ['analytics:9093']

  - job_name: client
    static_configs:
      - targets: ['client:9094']
