version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - gofmt
    - misspell
    - unconvert
    - unparam

linters-settings:
  gosec:
    excludes:
      - G115  # integer overflow (false positives in proto code)

issues:
  exclude-dirs:
    - vendor
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - unparam
